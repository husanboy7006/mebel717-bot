<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mebel Furnitura</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=2.2.0">
</head>
<body>
    <div id="app">
        <!-- Categories Tabs -->
        <div class="tabs-container" id="tabsContainer">
            <ul class="tabs" id="categoryTabs">
                <!-- Categories will be injected here -->
            </ul>
        </div>
        
        <!-- Search Bar -->
        <div class="search-container" id="searchContainer">
            <input type="text" id="searchInput" placeholder="Mahsulot qidirish..." oninput="onSearchInput()">
        </div>
        
        <!-- Products List -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">Yuklanmoqda...</div>
        </div>
        
        <!-- Cart View (Hidden by default) -->
        <div id="cartView" style="display: none;">
            <div class="cart-header" style="padding: 15px; font-weight: bold; font-size: 18px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;">
                <span>Sizning savatchangiz</span>
                <button onclick="clearCart()" style="background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;">Tozalash</button>
            </div>
            <div class="products-grid" id="cartGrid"></div>
        </div>
    </div>

    <!-- Sticky Bottom Bar -->
    <div id="stickyBar" class="sticky-bar" onclick="onStickyBarClick()">
        <div class="total-info">
            <span class="total-label">Jami:</span>
            <span id="stickyTotal" class="total-sum">0 so'm</span>
        </div>
        <div class="cart-btn">
            <span id="stickyBtnText">Savatcha</span>
            <span id="stickyCount" style="background: white; color: var(--button-color); padding: 2px 6px; border-radius: 50%; font-size: 12px; font-weight: bold;">0</span>
        </div>
    </div>

    <div id="version-label" style="text-align: center; font-size: 10px; color: #999; padding: 40px 10px 80px 10px; opacity: 0.5;">v3.2.0</div>
    <script src="/static/js/app_v3_2_0.js?v=3.2.0"></script>
</body>
</html>
